<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gender Classification</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Montserrat',sans-serif;
}

body{
    background:#0f172a;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.container{
    width:450px;
    background:#1e293b;
    padding:35px;
    border-radius:20px;
    box-shadow:0 0 30px rgba(0,255,255,.25);
    border:2px solid #06b6d4;
}

h1{
    text-align:center;
    color:#22d3ee;
    margin-bottom:10px;
    font-size:32px;
}

p{
    text-align:center;
    color:#cbd5e1;
    margin-bottom:25px;
}

label{
    color:#f8fafc;
    font-size:14px;
    display:block;
    margin-top:15px;
    margin-bottom:5px;
}

input{
    width:100%;
    padding:12px;
    background:#0f172a;
    border:2px solid #334155;
    border-radius:10px;
    color:white;
    outline:none;
    transition:.3s;
}

input:focus{
    border-color:#22d3ee;
    box-shadow:0 0 12px #22d3ee;
}

button{
    width:100%;
    margin-top:30px;
    padding:14px;
    border:none;
    border-radius:10px;
    background:#06b6d4;
    color:white;
    font-size:17px;
    font-weight:bold;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    background:#0891b2;
    transform:scale(1.03);
}

.result{
    margin-top:25px;
    background:#22c55e;
    color:white;
    padding:18px;
    text-align:center;
    border-radius:12px;
    font-size:20px;
    font-weight:bold;
}

</style>

</head>
<body>

<div class="container">

<h1>🤖 Gender Predictor</h1>

<p>Machine Learning Based Prediction</p>

<form method="POST">

<label>Long Hair</label>
<input type="number" name="long_hair" required>

<label>Forehead Width (cm)</label>
<input type="number" step="0.01" name="forehead_width_cm" required>

<label>Forehead Height (cm)</label>
<input type="number" step="0.01" name="forehead_height_cm" required>

<label>Nose Wide</label>
<input type="number" name="nose_wide" required>

<label>Nose Long</label>
<input type="number" name="nose_long" required>

<label>Lips Thin</label>
<input type="number" name="lips_thin" required>

<label>Distance Nose to Lip Long</label>
<input type="number" name="distance_nose_to_lip_long" required>

<button>Predict</button>

</form>

{% if prediction %}
<div class="result">
Prediction : {{ prediction }}
</div>
{% endif %}

</div>

</body>
</html>
